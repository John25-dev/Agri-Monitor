# Disable TRACE method (often used in Cross-Site Tracing attacks)
TraceEnable Off

# Custom Headers to hide the backend technology
Header unset X-Powered-By
Header set X-Content-Type-Options "nosniff"
Header set X-Frame-Options "DENY"

# Spoof the Server Header (Optional/Advanced)
# This makes the server look like something else entirely
# Requires mod_security or similar, but basic hiding is:
ServerSignature Off
ServerTokens ProductOnly
